<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display .expression {
      color: #a0a0c0;
      font-size: 14px;
      min-height: 20px;
      word-break: break-all;
    }

    .display .result {
      color: #e0e0ff;
      font-size: 36px;
      font-weight: 300;
      word-break: break-all;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 12px;
      font-size: 20px;
      padding: 18px 0;
      cursor: pointer;
      transition: filter 0.1s, transform 0.1s;
      color: #e0e0ff;
    }

    button:active {
      filter: brightness(0.8);
      transform: scale(0.96);
    }

    .btn-number  { background: #1a3a5c; }
    .btn-op      { background: #e94560; }
    .btn-action  { background: #0f3460; }
    .btn-equals  { background: #e94560; grid-column: span 2; }
    .btn-zero    { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-action" onclick="clearAll()">AC</button>
      <button class="btn-action" onclick="toggleSign()">+/−</button>
      <button class="btn-action" onclick="percent()">%</button>
      <button class="btn-op"     onclick="inputOp('/')">÷</button>

      <button class="btn-number" onclick="inputDigit('7')">7</button>
      <button class="btn-number" onclick="inputDigit('8')">8</button>
      <button class="btn-number" onclick="inputDigit('9')">9</button>
      <button class="btn-op"     onclick="inputOp('*')">×</button>

      <button class="btn-number" onclick="inputDigit('4')">4</button>
      <button class="btn-number" onclick="inputDigit('5')">5</button>
      <button class="btn-number" onclick="inputDigit('6')">6</button>
      <button class="btn-op"     onclick="inputOp('-')">−</button>

      <button class="btn-number" onclick="inputDigit('1')">1</button>
      <button class="btn-number" onclick="inputDigit('2')">2</button>
      <button class="btn-number" onclick="inputDigit('3')">3</button>
      <button class="btn-op"     onclick="inputOp('+')">+</button>

      <button class="btn-number btn-zero" onclick="inputDigit('0')">0</button>
      <button class="btn-number" onclick="inputDecimal()">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let previous = null;
    let operator = null;
    let resetNext = false;

    const resultEl = document.getElementById('result');
    const exprEl   = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = current;
    }

    function inputDigit(d) {
      if (resetNext) { current = d; resetNext = false; }
      else current = current === '0' ? d : current + d;
      updateDisplay();
    }

    function inputDecimal() {
      if (resetNext) { current = '0.'; resetNext = false; updateDisplay(); return; }
      if (!current.includes('.')) current += '.';
      updateDisplay();
    }

    function inputOp(op) {
      if (operator && !resetNext) calculate(true);
      previous = current;
      operator = op;
      resetNext = true;
      const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      exprEl.textContent = `${previous} ${symbols[op]}`;
    }

    function calculate(chaining = false) {
      if (operator === null || previous === null) return;
      const a = parseFloat(previous);
      const b = parseFloat(current);
      let result;
      switch (operator) {
        case '+': result = a + b; break;
        case '-': result = a - b; break;
        case '*': result = a * b; break;
        case '/':
          if (b === 0) { current = 'Error'; operator = null; previous = null; updateDisplay(); return; }
          result = a / b; break;
      }
      const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      if (!chaining) exprEl.textContent = `${previous} ${symbols[operator]} ${current} =`;
      current = parseFloat(result.toFixed(10)).toString();
      operator = chaining ? operator : null;
      previous = null;
      resetNext = true;
      updateDisplay();
    }

    function clearAll() {
      current = '0'; previous = null; operator = null; resetNext = false;
      exprEl.textContent = '';
      updateDisplay();
    }

    function toggleSign() {
      current = (parseFloat(current) * -1).toString();
      updateDisplay();
    }

    function percent() {
      current = (parseFloat(current) / 100).toString();
      updateDisplay();
    }

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
      else if (e.key === '.') inputDecimal();
      else if (e.key === '+') inputOp('+');
      else if (e.key === '-') inputOp('-');
      else if (e.key === '*') inputOp('*');
      else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        current = current.length > 1 ? current.slice(0, -1) : '0';
        updateDisplay();
      }
    });
  </script>
</body>
</html>
